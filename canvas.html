<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Autonomous & Tracking Constellation</title>
    <style>
        body {
            background-color: #050508;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <canvas id="cyberCanvas"></canvas>

    <script>
        const canvas = document.getElementById("cyberCanvas");
        const ctx = canvas.getContext("2d");

        let dpr = window.devicePixelRatio || 1;

        function resize() {
            dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        const mouse = { x: null, y: null, radius: 200 };
        const particles = [];
        const MAX_PARTICLES = 140; 

        window.addEventListener('pointermove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('pointerleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.size = Math.random() * 3.5 + 1.5; 
                
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 1.5 + 0.5;
                this.speedX = Math.cos(angle) * speed;
                this.speedY = Math.sin(angle) * speed;
                
                this.hue = Math.random() > 0.5 ? 190 : 280; 
                this.life = 0;
                this.maxLife = 1.0;
                this.fadeSpeed = Math.random() * 0.003 + 0.0015;
                this.isFadingOut = false;
            }

            update() {
                if (mouse.x !== null && mouse.y !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius;
                        this.speedX += (dx / distance) * force * 0.3;
                        this.speedY += (dy / distance) * force * 0.3;
                    }
                }

                this.x += this.speedX;
                this.y += this.speedY;

                this.speedX *= 0.95;
                this.speedY *= 0.95;

                if (Math.abs(this.speedX) < 0.2 && Math.abs(this.speedY) < 0.2) {
                    this.speedX = (Math.random() - 0.5) * 1.5;
                    this.speedY = (Math.random() - 0.5) * 1.5;
                }

                if (this.x < 0) { this.x = 0; this.speedX *= -1; }
                else if (this.x > window.innerWidth) { this.x = window.innerWidth; this.speedX *= -1; }

                if (this.y < 0) { this.y = 0; this.speedY *= -1; }
                else if (this.y > window.innerHeight) { this.y = window.innerHeight; this.speedY *= -1; }

                if (!this.isFadingOut) {
                    this.life += this.fadeSpeed;
                    if (this.life >= this.maxLife) this.isFadingOut = true;
                } else {
                    this.life -= this.fadeSpeed;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 65%, ${this.life})`;
                ctx.fill();
            }
        }

        function drawLines() {
            // Using a simpler stroke profile reduces overhead drastically compared to dynamic gradients
            ctx.lineWidth = 1.2;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        let opacity = (1 - (distance / 150)) * Math.min(particles[i].life, particles[j].life) * 0.25;
                        
                        // Blending the color mix using a midpoint hue estimate to save CPU cycles
                        let midHue = (particles[i].hue + particles[j].hue) / 2;
                        ctx.strokeStyle = `hsla(${midHue}, 100%, 65%, ${opacity})`;

                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(5, 5, 8, 0.12)'; 
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            ctx.globalCompositeOperation = 'lighter';

            while (particles.length < MAX_PARTICLES) {
                particles.push(new Particle());
            }

            drawLines();

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].isFadingOut && particles[i].life <= 0) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw();
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
