<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Autonomous & Tracking Constellation - Shockwave Edition</title>
    <style>
        body {
            background-color: #050508;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <canvas id="cyberCanvas"></canvas>

    <script>
        const canvas = document.getElementById("cyberCanvas");
        const ctx = canvas.getContext("2d");

        let dpr = window.devicePixelRatio || 1;
        let width = window.innerWidth;
        let height = window.innerHeight;

        function resize() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + "px";
            canvas.style.height = height + "px";
            
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        // Added shockwave trigger states
        const mouse = { 
            x: null, 
            y: null, 
            radius: 200,
            shockRadius: 0,
            isShockwave: false 
        };
        
        const particles = [];
        const MAX_PARTICLES = 140; 

        window.addEventListener('pointermove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('pointerleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Trigger the shockwave on click/tap
        window.addEventListener('pointerdown', (e) => {
            if (mouse.x !== null && mouse.y !== null) {
                mouse.isShockwave = true;
                mouse.shockRadius = 0; // Reset blast wave radius
            }
        });

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3.5 + 1.5; 
                
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 1.5 + 0.5;
                this.speedX = Math.cos(angle) * speed;
                this.speedY = Math.sin(angle) * speed;
                
                this.hue = Math.random() > 0.5 ? 190 : 280; 
                this.life = 0;
                this.maxLife = 1.0;
                this.fadeSpeed = Math.random() * 0.003 + 0.0015;
                this.isFadingOut = false;
            }

            update() {
                if (mouse.x !== null && mouse.y !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    // --- SHOCKWAVE PHYSICS ---
                    if (mouse.isShockwave) {
                        // Blast ring thickness boundary
                        let waveThickness = 100; 
                        if (distance > mouse.shockRadius - waveThickness && distance < mouse.shockRadius) {
                            // Reverse force calculation: repel violently away from cursor
                            let force = (waveThickness - (mouse.shockRadius - distance)) / waveThickness;
                            // Negative multiplier blasts them OUTWARD
                            this.speedX -= (dx / distance) * force * 12; 
                            this.speedY -= (dy / distance) * force * 12;
                        }
                    } 
                    // --- NORMAL TRACKING PHYSICS ---
                    else if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius;
                        this.speedX += (dx / distance) * force * 0.3;
                        this.speedY += (dy / distance) * force * 0.3;
                    }
                }

                this.x += this.speedX;
                this.y += this.speedY;

                // Slightly lower friction during shockwave to let the blast travel further
                const friction = mouse.isShockwave ? 0.97 : 0.95;
                this.speedX *= friction;
                this.speedY *= friction;

                if (Math.abs(this.speedX) < 0.2 && Math.abs(this.speedY) < 0.2) {
                    this.speedX = (Math.random() - 0.5) * 1.5;
                    this.speedY = (Math.random() - 0.5) * 1.5;
                }

                if (this.x < 0) { this.x = 0; this.speedX *= -1; }
                else if (this.x > width) { this.x = width; this.speedX *= -1; }

                if (this.y < 0) { this.y = 0; this.speedY *= -1; }
                else if (this.y > height) { this.y = height; this.speedY *= -1; }

                if (!this.isFadingOut) {
                    this.life += this.fadeSpeed;
                    if (this.life >= this.maxLife) this.isFadingOut = true;
                } else {
                    this.life -= this.fadeSpeed;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 65%, ${this.life})`;
                ctx.fill();
            }
        }

        function drawLines() {
            ctx.lineWidth = 1.2;
            const maxDist = 150;
            const maxDistSq = maxDist * maxDist;

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let distSq = dx * dx + dy * dy;

                    if (distSq < maxDistSq) {
                        let distance = Math.sqrt(distSq);
                        let opacity = (1 - (distance / maxDist)) * Math.min(particles[i].life, particles[j].life) * 0.25;
                        
                        let midHue = (particles[i].hue + particles[j].hue) / 2;
                        ctx.strokeStyle = `hsla(${midHue}, 100%, 65%, ${opacity})`;

                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(5, 5, 8, 0.12)'; 
            ctx.fillRect(0, 0, width, height);

            ctx.globalCompositeOperation = 'lighter';

            // Expands the shockwave ring over time
            if (mouse.isShockwave) {
                mouse.shockRadius += 25; // Speed of the explosion ring expansion
                
                // Draw a very subtle digital expansion ring
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, mouse.scatterRadius, 0, Math.PI * 2);
                let ringOpacity = Math.max(0, 1 - (mouse.shockRadius / 600));
                ctx.strokeStyle = `rgba(190, 255, 255, ${ringOpacity * 0.08})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Stop shockwave once it clears the max radius limit
                if (mouse.shockRadius > 600) {
                    mouse.isShockwave = false;
                }
            }

            while (particles.length < MAX_PARTICLES) {
                particles.push(new Particle());
            }

            drawLines();

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].isFadingOut && particles[i].life <= 0) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw();
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
